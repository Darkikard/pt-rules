name: Build PT Rules

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild (skip diff check)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 */3 * *'  # 每3天UTC时间0点执行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 整体超时保护
    steps:
      - uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          # 确保基础工具齐全
          sudo apt update && sudo apt install -y python3 unzip curl jq coreutils
          # 创建必要目录
          mkdir -p gen-rules

      - name: Cache mihomo
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: ./mihomo
          key: mihomo-$(date +%Y%m)  # 按月缓存，避免版本过旧
          restore-keys: |
            mihomo-

      - name: Fetch & Parse PT Sites
        id: parse-sites
        run: |
          # 增强下载容错：重试+超时
          curl -sL --retry 3 --connect-timeout 10 "https://github.com/mantou568/pre-dessert-sites/archive/main.zip" -o sites.zip || {
            echo "Failed to download sites zip"
            exit 1
          }
          unzip -q sites.zip -d sites || {
            echo "Failed to unzip sites zip"
            exit 1
          }

          python3 << 'PYEOF'
          import os, json, sys
          from urllib.parse import urlparse

          SITES_DIR = "sites/pre-dessert-sites-main/site_config/sites"
          COMMONS_DIR = "sites/pre-dessert-sites-main/site_config/commons"

          # 扩展排除列表，减少无效域名
          EXCLUDE = {"t.me", "bilibili.download", "localhost", "127.0.0.1", "::1"}

          site_domains = set()
          tracker_suffixes = set()

          # 检查目录是否存在
          if not os.path.exists(SITES_DIR):
              print(f"Error: {SITES_DIR} not found", file=sys.stderr)
              sys.exit(1)

          # 遍历所有站点 JSON
          file_count = 0
          for fname in sorted(os.listdir(SITES_DIR)):
              if not fname.endswith(".json"):
                  continue
              file_count += 1
              fpath = os.path.join(SITES_DIR, fname)
              try:
                  with open(fpath, encoding='utf-8') as f:
                      data = json.load(f)
              except json.JSONDecodeError:
                  print(f"Warning: Invalid JSON in {fname}, skip", file=sys.stderr)
                  continue
              except Exception as e:
                  print(f"Warning: Error reading {fname}: {e}, skip", file=sys.stderr)
                  continue

              urls = []
              # 兼容不同字段名（增强容错）
              domain_field = data.get("domain") or data.get("hostname")
              if domain_field:
                  urls.append(domain_field)
              urls.extend(data.get("additional_domain", []))
              urls.extend(data.get("alternate_domain", []))
              if data.get("api"):
                  urls.append(data["api"])

              for url in urls:
                  if not isinstance(url, str) or not url.strip():
                      continue
                  url = url.strip()
                  # 补全协议头
                  parsed = urlparse(url if "://" in url else f"https://{url}")
                  host = parsed.hostname
                  if not host or host in EXCLUDE or host.replace('.','').isdigit():
                      continue

                  parts = host.split(".")
                  # 优化域名简化逻辑（避免多级www）
                  while parts[0] == "www" and len(parts) >= 3:
                      parts = parts[1:]
                  root_host = ".".join(parts)
                  site_domains.add(root_host)

                  # 收集Tracker后缀（仅保留有效后缀）
                  if len(parts) >= 2 and not root_host.endswith((".local", ".lan")):
                      tracker_suffixes.add(root_host)

          # 去重并排序
          site_domains = sorted(list(site_domains))
          tracker_suffixes = sorted(list(tracker_suffixes))
          tracker_keywords = sorted([f"tracker.{s}" for s in tracker_suffixes])

          print(f"Processed {file_count} files, got {len(site_domains)} site domains, {len(tracker_suffixes)} tracker suffixes")

          # 写入文件（确保目录存在）
          def write_file(path, lines):
              with open(path, "w", encoding='utf-8') as f:
                  f.writelines(lines)

          # 生成pt-direct.txt
          write_file("pt-direct.txt", [f"+.{d}\n" for d in site_domains])
          # 生成pt-tracker-direct.txt（增加更多兜底规则）
          tracker_lines = [f"+.{d}\n" for d in tracker_keywords] + ["tracker\n", "*.tracker\n"]
          write_file("pt-tracker-direct.txt", tracker_lines)
          # 生成pt-tracker-fakeip.txt
          write_file("pt-tracker-fakeip.txt", [f"+.{d}\n" for d in tracker_keywords])

          # 输出统计信息（用于后续判断）
          echo "site_count={len(site_domains)}" >> $GITHUB_OUTPUT
          echo "tracker_count={len(tracker_keywords)}" >> $GITHUB_OUTPUT
          PYEOF

      - name: Check changes
        id: diff
        run: |
          git add pt-direct.txt pt-tracker-direct.txt pt-tracker-fakeip.txt
          # 双重检查：文件变更 + 有效数据量
          if [[ "${{ inputs.force_build }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # 检查是否有文件变更，且解析到的域名数量>0
            if git diff --cached --quiet || [[ ${{ steps.parse-sites.outputs.site_count }} -eq 0 ]]; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Download mihomo (fallback to latest)
        if: steps.diff.outputs.changed == 'true' && steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          # 优先下载指定版本，失败则用最新通用版本
          MI_HOMO_URLS=(
            "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-go122.gz"
            "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz"
          )
          for url in "${MI_HOMO_URLS[@]}"; do
            echo "Trying to download mihomo from: $url"
            if curl -sL --retry 3 --connect-timeout 10 "$url" | gunzip > mihomo; then
              chmod +x mihomo
              # 验证可执行性
              if ./mihomo -v >/dev/null 2>&1; then
                echo "Successfully downloaded mihomo"
                exit 0
              fi
            fi
            echo "Failed to download from $url"
          done
          echo "All mihomo download attempts failed"
          exit 1

      - name: Generate MRS (Enhanced)
        if: steps.diff.outputs.changed == 'true'
        id: generate-mrs
        run: |
          # 验证mihomo可执行
          if ! ./mihomo -v >/dev/null 2>&1; then
            echo "mihomo is not executable"
            exit 1
          fi

          # 随机端口避免冲突
          HTTP_PORT=$((18080 + RANDOM % 100))
          API_PORT=$((19090 + RANDOM % 100))
          echo "Using HTTP port: $HTTP_PORT, API port: $API_PORT"

          # 启动HTTP服务（绑定临时目录）
          python3 -m http.server $HTTP_PORT --bind 127.0.0.1 --directory . &
          HTTP_PID=$!
          sleep 3  # 延长启动等待时间

          # 验证HTTP服务可用
          if ! curl -s "http://127.0.0.1:$HTTP_PORT/pt-direct.txt" >/dev/null 2>&1; then
            echo "HTTP server failed to start"
            kill $HTTP_PID 2>/dev/null || true
            exit 1
          fi

          # 生成convert.yaml（使用随机端口）
          cat > /tmp/convert.yaml << EOF2
          mode: rule
          log-level: error
          external-controller: 127.0.0.1:$API_PORT
          proxies:
            - name: DUMMY
              type: direct
          rule-providers:
            pt-direct:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-direct.txt"
              path: ./gen-rules/pt-direct.txt
              format: text
              behavior: domain
              interval: 86400
            pt-tracker:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-tracker-direct.txt"
              path: ./gen-rules/pt-tracker.txt
              format: text
              behavior: domain
              interval: 86400
            pt-fakeip:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-tracker-fakeip.txt"
              path: ./gen-rules/pt-fakeip.txt
              format: text
              behavior: domain
              interval: 86400
          rules:
            - MATCH,DUMMY
          EOF2

          # 启动mihomo（后台运行）
          ./mihomo -d . -f /tmp/convert.yaml > mihomo.log 2>&1 &
          MI_HOMO_PID=$!
          sleep 2

          # 等待MRS生成（延长超时到60秒，分步检查）
          MAX_WAIT=60
          WAIT_COUNT=0
          while [[ $WAIT_COUNT -lt $MAX_WAIT ]]; do
            if ls gen-rules/*.mrs 2>/dev/null | grep -q .; then
              echo "MRS files generated successfully"
              break
            fi
            WAIT_COUNT=$((WAIT_COUNT + 1))
            sleep 1
          done

          # 强制终止进程（避免僵尸进程）
          kill $MI_HOMO_PID 2>/dev/null || true
          kill $HTTP_PID 2>/dev/null || true

          # 检查MRS文件是否生成
          if ! ls gen-rules/*.mrs 2>/dev/null | grep -q .; then
            echo "MRS generation timeout or failed"
            cat mihomo.log  # 输出日志便于调试
            exit 1
          fi

          # 复制MRS文件并验证
          cp gen-rules/*.mrs ./ || true
          if ls *.mrs 2>/dev/null; then
            echo "mrs_generated=true" >> $GITHUB_OUTPUT
            ls -la *.mrs
          else
            echo "mrs_generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push (Safe Mode)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 拉取最新代码避免冲突
          git pull --rebase origin main || git pull --rebase origin master

          # 添加文件（仅添加存在的文件）
          git add pt-direct.txt pt-tracker-direct.txt pt-tracker-fakeip.txt 2>/dev/null
          if [[ ${{ steps.generate-mrs.outputs.mrs_generated }} == "true" ]]; then
            git add *.mrs 2>/dev/null
          fi

          # 检查是否有提交内容
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 提交并推送（重试机制）
          for i in {1..3}; do
            if git commit -m "auto: update PT rules $(date +%Y-%m-%d_%H:%M:%S) [site:${{ steps.parse-sites.outputs.site_count }}]"; then
              if git push; then
                echo "Push successful"
                exit 0
              fi
            fi
            echo "Attempt $i failed, retrying..."
            sleep 2
          done

          echo "Push failed after 3 attempts"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          # 清理进程和临时文件
          kill $(pgrep -f "python3 -m http.server") 2>/dev/null || true
          kill $(pgrep -f "./mihomo") 2>/dev/null || true
          rm -rf sites sites.zip /tmp/convert.yaml mihomo.log gen-rules/*
