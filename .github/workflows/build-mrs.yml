name: Build PT Rules

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild (skip diff check)'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 0 */3 * *'  # 每3天自动更新

permissions:
  contents: write

# 新增：强制使用 Node.js 24 解决弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 新增：整体超时保护，避免卡死
    steps:
      - uses: actions/checkout@v4

      # 新增：显式安装依赖（解决 unzip/python3 缺失风险）
      - name: Install Basic Dependencies
        run: |
          sudo apt update && sudo apt install -y python3 unzip curl coreutils

      - name: Cache mihomo
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: ./mihomo
          key: mihomo-v1.19.1

      - name: Fetch & Parse PT Sites
        run: |
          # 优化：下载重试+超时，避免网络波动失败
          curl -sL --retry 3 --connect-timeout 10 "https://github.com/mantou568/pre-dessert-sites/archive/main.zip" -o sites.zip || {
            echo "Download sites zip failed"
            exit 1
          }
          # 优化：检查解压是否成功
          unzip -q sites.zip -d sites || {
            echo "Unzip sites zip failed"
            exit 1
          }

          python3 << 'PYEOF'
          import os, json, sys
          from urllib.parse import urlparse

          SITES_DIR = "sites/pre-dessert-sites-main/site_config/sites"
          COMMONS_DIR = "sites/pre-dessert-sites-main/site_config/commons"

          # 扩展排除列表，过滤无效域名
          EXCLUDE = {"t.me", "bilibili.download", "localhost", "127.0.0.1", "::1"}

          site_domains = set()
          tracker_suffixes = set()

          # 优化：检查目录是否存在
          if not os.path.exists(SITES_DIR):
              print(f"Error: {SITES_DIR} not found", file=sys.stderr)
              sys.exit(1)

          # 遍历所有站点 JSON
          for fname in sorted(os.listdir(SITES_DIR)):
              if not fname.endswith(".json"):
                  continue
              try:
                  # 优化：指定 UTF-8 编码，避免解析乱码
                  with open(os.path.join(SITES_DIR, fname), encoding='utf-8') as f:
                      data = json.load(f)
              except Exception as e:
                  print(f"Warning: skip {fname} - {e}", file=sys.stderr)
                  continue

              urls = []
              if data.get("domain"):
                  urls.append(data["domain"])
              urls.extend(data.get("additional_domain", []))
              if data.get("api"):
                  urls.append(data["api"])

              for url in urls:
                  if not url:
                      continue
                  parsed = urlparse(url if "://" in url else "https://" + url)
                  host = parsed.hostname
                  if not host or host in EXCLUDE or host.replace('.','').isdigit():
                      continue

                  parts = host.split(".")
                  # www.xxx.com → xxx.com
                  if parts[0] == "www" and len(parts) >= 3:
                      root = ".".join(parts[1:])
                      site_domains.add(root)
                  else:
                      site_domains.add(host)

                  # 收集 TLD+1 后缀，避免重复生成 tracker
                  if len(parts) >= 2:
                      tracker_suffixes.add(".".join(parts[-2:]))

          # 优化：验证解析结果，避免空文件
          if len(site_domains) == 0:
              print("Error: No valid PT domains found", file=sys.stderr)
              sys.exit(1)

          # 生成 tracker 域名
          tracker_keywords = sorted(f"tracker.{s}" for s in tracker_suffixes)
          site_domains = sorted(site_domains)

          print(f"Sites: {len(site_domains)}, Tracker suffixes: {len(tracker_suffixes)}")

          # 写 pt-direct.txt
          with open("pt-direct.txt", "w", encoding='utf-8') as f:
              for d in site_domains:
                  f.write(f"+.{d}\n")

          # 写 pt-tracker-direct.txt
          with open("pt-tracker-direct.txt", "w", encoding='utf-8') as f:
              for d in tracker_keywords:
                  f.write(f"+.{d}\n")
              f.write("tracker\n")  # DOMAIN-KEYWORD 兜底

          # 写 pt-tracker-fakeip.txt
          with open("pt-tracker-fakeip.txt", "w", encoding='utf-8') as f:
              for d in tracker_keywords:
                  f.write(f"+.{d}\n")
          PYEOF

      - name: Check changes
        id: diff
        run: |
          git add pt-direct.txt pt-tracker-direct.txt pt-tracker-fakeip.txt
          if [[ "${{ inputs.force_build }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # 优化：双重检查（diff + 文件非空）
            if git diff --cached --quiet; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              [[ -s pt-direct.txt ]] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Download mihomo
        if: steps.diff.outputs.changed == 'true' && steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          # 优化：多源下载 + 可执行性验证，避免单源失效
          MI_HOMO_URLS=(
            "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-go122.gz"
            "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz"
          )
          for url in "${MI_HOMO_URLS[@]}"; do
            if curl -sL --retry 3 --connect-timeout 10 "$url" | gunzip > mihomo; then
              chmod +x mihomo
              # 验证二进制文件是否可用
              ./mihomo -v >/dev/null 2>&1 && exit 0
            fi
          done
          echo "Mihomo download failed (all sources)"
          exit 1

      - name: Generate MRS
        if: steps.diff.outputs.changed == 'true'
        run: |
          chmod +x mihomo

          # 优化：随机端口，避免端口占用冲突
          HTTP_PORT=$((18080 + RANDOM % 100))
          API_PORT=$((19090 + RANDOM % 100))

          # 启动 HTTP 服务
          python3 -m http.server $HTTP_PORT --bind 127.0.0.1 &
          HTTP_PID=$!
          sleep 3  # 延长等待，确保服务启动

          # 验证 HTTP 服务是否可用
          curl -s "http://127.0.0.1:$HTTP_PORT/pt-direct.txt" >/dev/null 2>&1 || {
            echo "HTTP server failed to start"
            kill $HTTP_PID 2>/dev/null || true
            exit 1
          }

          # 生成配置文件（替换固定端口为随机端口）
          cat > /tmp/convert.yaml << EOF2
          mode: rule
          log-level: error  # 优化：输出错误日志，便于调试
          external-controller: 127.0.0.1:$API_PORT
          proxies:
            - {name: DUMMY, type: direct}
          rule-providers:
            pt-direct:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-direct.txt"
              path: ./gen-rules/pt-direct.txt
              format: text
              behavior: domain
              interval: 86400
            pt-tracker:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-tracker-direct.txt"
              path: ./gen-rules/pt-tracker.txt
              format: text
              behavior: domain
              interval: 86400
            pt-fakeip:
              type: http
              url: "http://127.0.0.1:$HTTP_PORT/pt-tracker-fakeip.txt"
              path: ./gen-rules/pt-fakeip.txt
              format: text
              behavior: domain
              interval: 86400
          rules:
            - MATCH,DUMMY
          EOF2

          # 启动 mihomo 生成 MRS
          ./mihomo -d . -f /tmp/convert.yaml > mihomo.log 2>&1 &
          MI_HOMO_PID=$!

          # 优化：更可靠的等待逻辑（最多 60 秒）
          MAX_WAIT=60
          WAIT_COUNT=0
          while [[ $WAIT_COUNT -lt $MAX_WAIT ]]; do
            if ls gen-rules/*.mrs 2>/dev/null; then
              break
            fi
            WAIT_COUNT=$((WAIT_COUNT + 1))
            sleep 1
          done

          # 检查是否生成成功
          if ! ls gen-rules/*.mrs 2>/dev/null; then
            echo "MRS generation timeout/failed, logs:"
            cat mihomo.log  # 输出日志便于调试
            kill $MI_HOMO_PID 2>/dev/null || true
            kill $HTTP_PID 2>/dev/null || true
            exit 1
          fi

          # 清理进程（精准杀死，避免误杀）
          kill $MI_HOMO_PID 2>/dev/null || true
          kill $HTTP_PID 2>/dev/null || true

          # 复制 MRS 文件
          cp gen-rules/*.mrs ./ 2>/dev/null || true
          ls -la *.mrs 2>/dev/null || echo "No MRS files generated"

      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 优化：拉取最新代码，避免推送冲突
          git pull --rebase origin main || git pull --rebase origin master

          # 优化：仅添加存在的文件，避免空文件提交
          git add pt-direct.txt pt-tracker-direct.txt pt-tracker-fakeip.txt 2>/dev/null
          ls *.mrs 2>/dev/null && git add *.mrs 2>/dev/null

          # 优化：检查是否有内容需要提交
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # 优化：推送重试，避免网络波动失败
          for i in {1..3}; do
            git commit -m "auto: update PT rules $(date +%Y-%m-%d_%H:%M:%S)" && git push && exit 0
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1

      # 新增：强制清理进程，避免资源泄漏
      - name: Cleanup
        if: always()
        run: |
          kill $(pgrep -f "python3 -m http.server") 2>/dev/null || true
          kill $(pgrep -f "./mihomo") 2>/dev/null || true
          rm -rf sites sites.zip /tmp/convert.yaml mihomo.log
